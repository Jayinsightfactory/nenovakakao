# 네노바 카톡 메시지 분류 규칙
#
# 이 파일은 관리자가 직접 편집합니다 — 코드 수정 불필요.
# 저장 후 다음 main.py 실행부터 즉시 반영.
#
# 분류 우선순위 (위에서 아래로):
#   LOGISTICS > DEFECT > CANCEL > ORDER > SHIPMENT > ARRIVAL
#   > INVENTORY > FINANCE > SYSTEM > INQUIRY > DECISION > PHOTO(최후)
#
# 키워드 추가/삭제 후 저장만 하면 끝.
# 정규식을 쓰고 싶으면 "~:" 접두사 사용 (예: "~:\\d+단").

priority:
  - LOGISTICS
  - DEFECT
  - CANCEL
  - ORDER
  - SHIPMENT
  - ARRIVAL
  - INVENTORY
  - FINANCE
  - SYSTEM
  - INQUIRY
  - DECISION
  - PHOTO

event_types:
  LOGISTICS:
    description: 검역·통관·세관·협력사 업무 흐름

      - 세관
      - 합격
      - 불합격
      - 소독
      - 통관
      - ICA
      - 페킹리스트
      - 검역품목
      - 검역 전달
      - 검역결과
      - 검역완료
      - 시료
      - 식물검역

  DEFECT:
    description: 불량·클레임·품질이슈 (거래처 품질 협상 포함)
    keywords:
      - 불량
      - 클레임
      - 파손
      - 마름
      - 전량클레임
      - 겉잎제거
      - 검역차감
      - 차감건
      - 총체
      - 병해
      - 곰팡이
      - 시들
      - 변색
      - 꺾임
      - 부패
      - 물러짐
      - 흑점
      - 품질 이슈
      - 품질이슈
      - 품질 문제
      - 환불
      - 사과드립니다
      - 신경 쓰도록
      - 신경쓰도록
      - 재발방지
      - 재발 방지

  CANCEL:
    description: 주문 취소·보류
    event_type: ORDER_CHANGE  # 실제 기록 타입 (direction = "-")
    direction: "-"
    keywords:
      - 취소
      - 삭제
      - 보류

  ORDER:
    description: 주문 추가·변경·발주
    event_type: ORDER_CHANGE
    direction: "+"
    keywords:
      - 추가
      - 변경
      # "수정" 은 오타 정정 ("*수정") 오분류 회피 — specific 패턴만 사용
      - 수정요청
      - 수정 요청
      - 수정부탁
      - 수정 부탁
      - 수정해주세요
      - 수정 바랍
      - 발주
      - 요청
      - 잔량
      - 출고요청
      - 선출고
      - 미출고
      - 재출고
      - 대체

  SHIPMENT:

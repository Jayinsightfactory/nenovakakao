# 정규식 규칙 (data/learning/pattern_library.json 의 P001~P039 중 엄선)
# 키워드 기반 분류보다 먼저 평가됨. 첫 매칭만 적용.
# direction 명시 시 ORDER_CHANGE + / - 구분에 쓰임.
regex_rules:
  # ── 수입/발주 (IMPORT) ──
  - name: 발주_추가_요청             # P001
    pattern: '\d+(?:-\d+)?\s*차?\s*(?:중국|콜|콜롬비아|네덜란드|호주|태국|에콰)?\s*.+?(?:발주\s*)?추가'
    event_type: ORDER_CHANGE
    direction: "+"

  - name: 변경사항_헤더              # P028
    pattern: '^\s*\d+[-/]?\d*\s*차?\s*(?:콜|중국|네덜)?\s*[가-힣]+\s*변경사항'
    event_type: ORDER_CHANGE

  - name: 컷팅_완료_보고             # P006
    pattern: '컷팅\s*(?:아직\s*)?(?:끝나지\s*)?(?:않았습니다|완료|시작)'
    event_type: LOGISTICS

  # ── 재고/입고 (INVENTORY) ──
  - name: 입고수량_이상없음           # P009
    pattern: '입고수량\s*이상\s*없습니다'
    event_type: INVENTORY

  - name: 출고후_잔량                # P029
    pattern: '^\s*\d+\s*차?\s*출고후\s*잔량'
    event_type: INVENTORY

  - name: 부족_폐기_보고             # P032
    pattern: '[가-힣]+\s+\d+\s*(?:부족|폐기)(?!없|보)'
    event_type: INVENTORY

  # ── 도착/물류 (ARRIVAL/LOGISTICS) ──
  - name: 화물번호_도착              # P017
    pattern: '\d{3}-\d{8,11}.*?(?:도착|입항|새벽|야간)'
    event_type: ARRIVAL

  - name: 항공편_편명                # P019
    pattern: '[A-Z]{2}\d{1,4}\s*\(\d{1,2}:\d{2}\)'
    event_type: ARRIVAL

  - name: 소독_일정_공지             # P018
    pattern: '금일\s+(?:오후|새벽|오전)?\s*소독건'
    event_type: LOGISTICS

  # ── 문의/요청 (INQUIRY) ──
  - name: 빌_전달_부탁               # P020
    pattern: '(?:입항|저녁|새벽)\s*빌\s*전달\s*(?:부탁|요청)'
    event_type: INQUIRY

  # ── 결정/판정 (DECISION) ──
  - name: 클레임_불가_판정           # P038
    pattern: '(?:클레임\s*(?:불가능|어렵|진행하기 어렵)|진행하기\s*어렵)'
    event_type: DECISION

# 방 타입별 이벤트 오버라이드
# 타입은 core/room_types.classify_room_type() 가 방 이름에서 자동 판별.
# 같은 키워드라도 방 성격에 따라 의미가 달라서 event_type 을 리매핑한다.
#
# 형식:
#   <방타입>:
#     <원래 event_type>: <리매핑될 event_type>
#   default:
#     <원래 event_type>: <리매핑>   # 모든 타입에 공통 적용 (선택)
#
# 관리자가 자유롭게 편집 가능.
type_overrides:
  SUPPLIER_CHANNEL:
    # 거래처 채널에서의 불량 = 거래처의 사과/협상/정보요청 맥락
    DEFECT: DEFECT_EXTERNAL
    # 거래처가 출고/발송 부탁하는 SHIPMENT 도 컨텍스트 구분
    SHIPMENT: SHIPMENT_EXTERNAL
  PARTNER_CHANNEL:
    # 선율(검역)/방역 협력사 방 — 업무 정상흐름이므로 LOGISTICS 로 통합
    ARRIVAL: LOGISTICS_PARTNER
    INFO: LOGISTICS_PARTNER
    LOGISTICS: LOGISTICS_PARTNER
  INTERNAL_BACKBONE:
    # 내부 불량 보고는 구조화된 DEFECT_REPORT 로 구분
    DEFECT: DEFECT_REPORT
  # INTERNAL_PRIVATE, MISC 는 원본 분류 유지

# 정규식 패턴 (고정)
patterns:
  sequence: '(\d{1,3})[-/]?(\d{0,2})\s*차?'
  quantity: '(\d+)\s*(단|송이|박스|속|개|스팀|대)'
  message_header: '^\[(.+?)\]\s*\[(.+?)\]\s*(.+)$'
